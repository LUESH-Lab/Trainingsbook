<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Training">
<title>Training</title>
<style>
:root {
  --bg: #0f0f13;
  --card: #1a1a22;
  --card2: #22222e;
  --border: #2a2a38;
  --accent: #00e5a0;
  --accent2: #ff4d6d;
  --accent3: #ffd60a;
  --text: #f0f0f0;
  --text2: #888899;
  --text3: #555566;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
.screen { display: none; padding-bottom: 90px; }
.screen.active { display: block; }

/* Header */
.header { background: var(--bg); padding: 16px 16px 12px; border-bottom: 0.5px solid var(--border); position: sticky; top: 0; z-index: 10; display: flex; align-items: center; justify-content: space-between; }
.header-left h1 { font-size: 24px; font-weight: 700; color: var(--text); letter-spacing: -0.5px; }
.header-left p { font-size: 13px; color: var(--text2); margin-top: 2px; }
.header-nav { display: flex; gap: 6px; }
.nav-arrow { width: 38px; height: 38px; border-radius: 50%; border: 1.5px solid var(--border); background: var(--card); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; color: var(--accent); }
.nav-arrow:disabled { color: var(--text3); border-color: var(--border); }

/* Streak Bar */
.streak-bar { background: linear-gradient(135deg, #1a1200, #2a1f00); padding: 12px 16px; border-bottom: 0.5px solid var(--border); display: flex; align-items: center; gap: 10px; }
.streak-num { font-size: 32px; font-weight: 800; color: var(--accent3); }
.streak-label { font-size: 13px; color: #cc9900; }

/* Bottom Nav */
.bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; background: var(--card); border-top: 0.5px solid var(--border); display: flex; padding-bottom: env(safe-area-inset-bottom); z-index: 100; }
.nav-item { flex: 1; padding: 8px 2px 10px; display: flex; flex-direction: column; align-items: center; gap: 3px; border: none; background: none; cursor: pointer; color: var(--text3); font-size: 9px; font-weight: 500; }
.nav-item.active { color: var(--accent); }
.nav-icon { font-size: 20px; }

/* Cards */
.card { background: var(--card); border-radius: 16px; margin: 12px 16px 0; padding: 16px; border: 0.5px solid var(--border); }
.card-title { font-size: 11px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 14px; }

/* Emoji Buttons */
.emoji-row { display: flex; gap: 8px; }
.emoji-btn { flex: 1; padding: 12px 4px; border: 1.5px solid var(--border); border-radius: 14px; background: var(--card2); font-size: 22px; text-align: center; cursor: pointer; transition: all 0.12s; }
.emoji-btn.selected { border-color: var(--accent); background: #00e5a015; transform: scale(1.1); }

/* Tags */
.tag-row { display: flex; flex-wrap: wrap; gap: 8px; }
.tag { padding: 8px 14px; border: 1.5px solid var(--border); border-radius: 20px; font-size: 13px; background: var(--card2); cursor: pointer; color: var(--text2); font-weight: 500; }
.tag.selected { border-color: var(--accent); background: #00e5a015; color: var(--accent); }

/* Inputs */
.notiz-input { width: 100%; border: 1.5px solid var(--border); border-radius: 14px; padding: 12px; font-size: 15px; font-family: inherit; color: var(--text); background: var(--card2); resize: none; height: 90px; outline: none; }
.notiz-input:focus { border-color: var(--accent); }
.date-input { width: 100%; border: 1.5px solid var(--border); border-radius: 14px; padding: 12px; font-size: 15px; font-family: inherit; background: var(--card2); outline: none; color: var(--text); }
.date-input:focus { border-color: var(--accent); }

/* Buttons */
.save-btn { display: block; width: calc(100% - 32px); margin: 16px 16px 0; padding: 16px; background: var(--accent); color: #000; border: none; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer; letter-spacing: 0.3px; }
.save-btn:active { opacity: 0.85; transform: scale(0.98); }

/* Toast */
.toast { position: fixed; top: 60px; left: 50%; transform: translateX(-50%); padding: 10px 22px; border-radius: 22px; font-size: 14px; font-weight: 600; z-index: 999; opacity: 0; transition: opacity 0.25s; pointer-events: none; color: #000; white-space: nowrap; }
.toast.show { opacity: 1; }
.toast.ok { background: var(--accent); }
.toast.err { background: var(--accent2); color: #fff; }

/* Heute */
.heute-hero { margin: 12px 16px 0; border-radius: 16px; padding: 20px; background: linear-gradient(135deg, #003d2a, #005a3a); border: 1px solid #00e5a030; }
.heute-badge { display: inline-block; background: var(--accent); color: #000; font-size: 11px; font-weight: 700; padding: 3px 10px; border-radius: 20px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
.heute-title { font-size: 22px; font-weight: 700; color: var(--text); }
.heute-sub { font-size: 14px; color: #00e5a099; margin-top: 4px; }

.uebung-item { display: flex; align-items: flex-start; gap: 14px; padding: 14px 0; border-bottom: 0.5px solid var(--border); cursor: pointer; }
.uebung-item:last-child { border-bottom: none; }
.uebung-check { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; transition: all 0.15s; margin-top: 1px; background: var(--card2); }
.uebung-check.done { background: var(--accent); border-color: var(--accent); }
.uebung-check.done::after { content: '✓'; color: #000; font-size: 14px; font-weight: 700; }
.uebung-info { flex: 1; }
.uebung-name { font-size: 15px; font-weight: 600; color: var(--text); }
.uebung-detail { font-size: 13px; color: var(--text2); margin-top: 2px; }
.uebung-hinweis { font-size: 12px; color: var(--accent); margin-top: 3px; }
.uebung-item.done .uebung-name { text-decoration: line-through; color: var(--text3); }

.abschluss-btn { display: block; width: calc(100% - 32px); margin: 16px 16px 0; padding: 16px; background: var(--accent2); color: #fff; border: none; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer; }

.no-plan-card { margin: 12px 16px 0; border-radius: 16px; padding: 24px 20px; background: var(--card); border: 0.5px solid var(--border); text-align: center; }
.no-plan-icon { font-size: 48px; margin-bottom: 12px; }
.no-plan-title { font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
.no-plan-sub { font-size: 14px; color: var(--text2); line-height: 1.5; }

/* Verlauf */
.entry-card { background: var(--card); border-radius: 16px; margin: 10px 16px 0; padding: 14px 16px; border: 0.5px solid var(--border); }
.entry-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
.entry-date-label { font-size: 13px; color: var(--text2); font-weight: 600; }
.delete-btn { width: 30px; height: 30px; border-radius: 50%; border: none; background: #ff4d6d15; color: var(--accent2); font-size: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
.score-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.pill { display: flex; align-items: center; gap: 4px; background: var(--card2); border-radius: 20px; padding: 4px 10px; font-size: 12px; color: var(--text2); border: 0.5px solid var(--border); }
.etags { display: flex; flex-wrap: wrap; gap: 5px; margin-bottom: 6px; }
.etag { font-size: 12px; padding: 3px 10px; border-radius: 10px; background: #00e5a015; color: var(--accent); font-weight: 600; }
.enote { font-size: 13px; color: var(--text2); font-style: italic; }

/* Stats */
.stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 12px 16px 0; }
.stat-card { background: var(--card); border-radius: 16px; padding: 16px; text-align: center; border: 0.5px solid var(--border); }
.stat-num { font-size: 28px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 11px; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
.week-day { background: var(--card2); border-radius: 10px; padding: 8px 4px; text-align: center; border: 0.5px solid var(--border); }
.week-day-name { font-size: 10px; color: var(--text3); margin-bottom: 4px; font-weight: 600; }
.week-day-emoji { font-size: 16px; }
.week-day.has-entry { background: #00e5a015; border-color: var(--accent); }

/* Übungen */
.uebung-lib-item { background: var(--card); border-radius: 16px; margin: 10px 16px 0; overflow: hidden; border: 0.5px solid var(--border); }
.uebung-lib-header { padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; cursor: pointer; }
.uebung-lib-name { font-size: 15px; font-weight: 600; color: var(--text); }
.uebung-lib-tag { font-size: 10px; padding: 3px 10px; border-radius: 20px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
.uebung-lib-body { padding: 0 16px 16px; border-top: 0.5px solid var(--border); display: none; }
.uebung-lib-body.open { display: block; }
.uebung-lib-desc { font-size: 14px; color: var(--text2); line-height: 1.6; margin-top: 12px; }
.uebung-lib-cue { font-size: 13px; color: var(--accent); margin-top: 10px; font-style: italic; background: #00e5a010; padding: 8px 12px; border-radius: 10px; border-left: 3px solid var(--accent); }
.search-input { width: calc(100% - 32px); margin: 12px 16px 0; padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 14px; font-size: 15px; font-family: inherit; background: var(--card); outline: none; color: var(--text); }
.search-input:focus { border-color: var(--accent); }
.search-input::placeholder { color: var(--text3); }

/* Intensity */
.intensity-row { display: flex; gap: 8px; }
.int-btn { flex: 1; padding: 12px 4px; border: 1.5px solid var(--border); border-radius: 14px; background: var(--card2); font-size: 12px; text-align: center; cursor: pointer; color: var(--text2); line-height: 1.4; font-weight: 500; }
.int-btn.selected { border-color: var(--accent); background: #00e5a015; color: var(--accent); font-weight: 700; }

/* Setup */
.setup-card { background: var(--card); border-radius: 16px; margin: 12px 16px 0; padding: 16px; border: 0.5px solid var(--border); }
.setup-card p { font-size: 14px; color: var(--text2); line-height: 1.6; }
.url-input { width: 100%; border: 1.5px solid var(--border); border-radius: 14px; padding: 12px; font-size: 14px; font-family: inherit; background: var(--card2); outline: none; margin-top: 10px; color: var(--text); }
.url-input:focus { border-color: var(--accent); }
.action-btn { width: 100%; margin-top: 10px; padding: 12px; background: var(--accent); color: #000; border: none; border-radius: 14px; font-size: 14px; font-weight: 700; cursor: pointer; }
.status-row { display: flex; align-items: center; gap: 10px; margin: 12px 16px 0; background: var(--card); border-radius: 14px; padding: 14px 16px; border: 0.5px solid var(--border); }
.dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; background: #e67e22; }
.dot-ok { background: var(--accent) !important; }

/* Confirm */
.confirm-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: flex; align-items: flex-end; }
.confirm-box { background: var(--card); border-radius: 20px 20px 0 0; padding: 24px 20px; width: 100%; border-top: 0.5px solid var(--border); }
.confirm-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; color: var(--text); }
.confirm-text { font-size: 14px; color: var(--text2); margin-bottom: 20px; }
.confirm-btns { display: flex; gap: 10px; }
.confirm-cancel { flex: 1; padding: 14px; background: var(--card2); border: 1px solid var(--border); border-radius: 14px; font-size: 15px; cursor: pointer; color: var(--text); font-weight: 600; }
.confirm-delete { flex: 1; padding: 14px; background: var(--accent2); color: #fff; border: none; border-radius: 14px; font-size: 15px; font-weight: 700; cursor: pointer; }
.section-gap { height: 12px; }
</style>
</head>
<body>
<div id="toast" class="toast ok"></div>
<div id="confirm-overlay" class="confirm-overlay" style="display:none;">
  <div class="confirm-box">
    <div class="confirm-title">Eintrag löschen?</div>
    <div class="confirm-text" id="confirm-text"></div>
    <div class="confirm-btns">
      <button class="confirm-cancel" onclick="closeConfirm()">Abbrechen</button>
      <button class="confirm-delete" onclick="confirmDelete()">Löschen</button>
    </div>
  </div>
</div>

<!-- HEUTE -->
<div id="screen-heute" class="screen active">
  <div class="header">
    <div class="header-left">
      <h1 id="heute-title">Heute</h1>
      <p id="heute-date"></p>
    </div>
    <div class="header-nav">
      <button class="nav-arrow" id="prev-day" onclick="changeDay(-1)">‹</button>

    </div>

  <div id="streak-bar" class="streak-bar"></div>

  <div class="section-gap"></div>
</div>

<!-- EINTRAG -->
<div id="screen-log" class="screen">

  <div class="card">
    <div class="card-title">Energie</div>
    <div class="emoji-row" id="energie">
      <button class="emoji-btn" data-val="1" onclick="sel('energie',this)">😴</button>
      <button class="emoji-btn" data-val="2" onclick="sel('energie',this)">😓</button>
      <button class="emoji-btn" data-val="3" onclick="sel('energie',this)">😐</button>
      <button class="emoji-btn" data-val="4" onclick="sel('energie',this)">😊</button>
      <button class="emoji-btn" data-val="5" onclick="sel('energie',this)">🚀</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Schlaf</div>
    <div class="emoji-row" id="schlaf">
      <button class="emoji-btn" data-val="1" onclick="sel('schlaf',this)">😴</button>
      <button class="emoji-btn" data-val="2" onclick="sel('schlaf',this)">😓</button>
      <button class="emoji-btn" data-val="3" onclick="sel('schlaf',this)">😐</button>
      <button class="emoji-btn" data-val="4" onclick="sel('schlaf',this)">😊</button>
      <button class="emoji-btn" data-val="5" onclick="sel('schlaf',this)">🚀</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Stimmung</div>
    <div class="emoji-row" id="stimmung">
      <button class="emoji-btn" data-val="1" onclick="sel('stimmung',this)">😤</button>
      <button class="emoji-btn" data-val="2" onclick="sel('stimmung',this)">😕</button>
      <button class="emoji-btn" data-val="3" onclick="sel('stimmung',this)">😐</button>
      <button class="emoji-btn" data-val="4" onclick="sel('stimmung',this)">😊</button>
      <button class="emoji-btn" data-val="5" onclick="sel('stimmung',this)">🤩</button>
    </div>
  </div>
  <div class="card">
    <div class="card-title">Training war...</div>
    <div class="intensity-row" id="intensity">
      <button class="int-btn" data-val="leicht" onclick="selInt(this)">😴<br>Zu leicht</button>
      <button class="int-btn" data-val="perfekt" onclick="selInt(this)">✅<br>Perfekt</button>
      <button class="int-btn" data-val="hart" onclick="selInt(this)">🔥<br>Sehr hart</button>
      <button class="int-btn" data-val="zuhart" onclick="selInt(this)">💀<br>Zu viel</button>

      <button class="tag" onclick="toggleTag(this)">Athletik Di</button>
      <button class="tag" onclick="toggleTag(this)">Athletik Do</button>
      <button class="tag" onclick="toggleTag(this)">Technik So</button>
      <button class="tag" onclick="toggleTag(this)">Spiel</button>
      <button class="tag" onclick="toggleTag(this)">Turnier</button>
      <button class="tag" onclick="toggleTag(this)">Ruhetag</button>
    </div>

  <div class="card">
    <div class="card-title">Notiz (optional)</div>
    <textarea class="notiz-input" id="notiz" placeholder="Schmerzen, Stimmung, was aufgefallen ist..."></textarea>
  </div>
  <button class="save-btn" onclick="saveEntry()">Eintrag speichern</button>
  <div class="section-gap"></div>
</div>

<!-- VERLAUF -->
<div id="screen-history" class="screen">
  <div class="header"><div class="header-left"><h1>Verlauf</h1><p>Letzte Einträge</p></div></div>
  <div id="history-list"></div>
  <div class="section-gap"></div>
</div>

<!-- ÜBUNGEN -->
<div id="screen-uebungen" class="screen">
  <div class="header"><div class="header-left"><h1>Übungen</h1><p>Antippen zum Aufklappen</p></div></div>
  <input type="text" class="search-input" placeholder="🔍 Suchen..." oninput="filterUebungen(this.value)">
  <div id="uebungen-list"></div>
  <div class="section-gap"></div>
</div>

<!-- STATS -->
<div id="screen-stats" class="screen">
  <div class="header"><div class="header-left"><h1>Stats</h1><p>Letzte 4 Wochen</p></div></div>
  <div class="card" style="margin-top:12px;">
    <div class="card-title">Diese Woche</div>
    <div class="week-grid" id="week-grid"></div>
  </div>
  <div class="stats-grid" id="stats-grid"></div>
  <div class="card" style="margin-top:12px;">
    <div class="card-title">Belastungshinweise</div>
    <div id="trend-list"></div>
  </div>
  <div class="section-gap"></div>
</div>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <button class="nav-item active" onclick="showScreen('screen-heute')" id="nav-heute"><span class="nav-icon">⚡️</span><span>Heute</span></button>
  <button class="nav-item" onclick="showScreen('screen-log')" id="nav-log"><span class="nav-icon">✏️</span><span>Tagebuch</span></button>

  <button class="nav-item" onclick="showScreen('screen-uebungen')" id="nav-uebungen"><span class="nav-icon">📖</span><span>Übungen</span></button>
  <button class="nav-item" onclick="showScreen('screen-stats')" id="nav-stats"><span class="nav-icon">📊</span><span>Stats</span></button>
</nav>

<script>
const STORAGE_KEY = 'fina_tb_v5'; // gleicher Key — Daten bleiben erhalten!
const WEBHOOK_KEY = 'fina_webhook_v3';
const WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbx0npde641aGNWslhBJpBcqNpJL1_P4iRA3BB5ztX3S7-J42raKuh_7qu5FXNlfIepX/exec';
const emojiMap = {1:'😴',2:'😓',3:'😐',4:'😊',5:'🚀'};
const moodMap = {1:'😤',2:'😕',3:'😐',4:'😊',5:'🤩'};
const labelMap = {1:'Sehr schwer',2:'Schwer',3:'Okay',4:'Gut',5:'Top'};
const navMap = {'screen-heute':'nav-heute','screen-log':'nav-log','screen-history':'nav-history','screen-uebungen':'nav-uebungen','screen-stats':'nav-stats'};
const vals = {beine:0,energie:0,schlaf:0,stimmung:0};
let intensityVal='', deleteTarget=null, checkedUebungen={}, currentDayOffset=0;
const PLAN_CACHE_KEY='fina_plan_cache_v2';
const PLAN_CACHE_TTL=60*60*1000; // 60 Minuten

function getCachedPlan(){
  try{
    const c=JSON.parse(localStorage.getItem(PLAN_CACHE_KEY)||'null');
    if(c&&(Date.now()-c.ts)<PLAN_CACHE_TTL)return c.plan;
  }catch(e){}
  return null;
}
function setCachedPlan(plan){
  localStorage.setItem(PLAN_CACHE_KEY,JSON.stringify({plan,ts:Date.now()}));
}
function clearPlanCache(){
  localStorage.removeItem(PLAN_CACHE_KEY);
}

const TAGESTEXT = {
  0: { icon:'😴', title:'Ruhetag', sub:'Regeneration ist auch Training.' },
  1: { icon:'⚽️', title:'Mannschaftstraining', sub:'Mo — Gas geben heute!' },
  2: { icon:'💥', title:'Athletiktag!', sub:'Di — Heute wird trainiert.' },
  3: { icon:'⚽️', title:'Mannschaftstraining', sub:'Mi — Alles geben!' },
  4: { icon:'💥', title:'Athletiktag!', sub:'Do — Heute wird trainiert.' },
  5: { icon:'⚽️', title:'Mannschaftstraining', sub:'Fr — Letztes Training vor dem Spiel.' },
  6: { icon:'🏆', title:'Spieltag!', sub:'Sa — Alles rauslassen.' },

function getEntries(){try{return JSON.parse(localStorage.getItem(STORAGE_KEY)||'[]');}catch(e){return[];}}
function saveEntries(e){localStorage.setItem(STORAGE_KEY,JSON.stringify(e));}
function getWebhook(){return localStorage.getItem(WEBHOOK_KEY)||WEBHOOK_URL;}

function sel(g,btn){document.querySelectorAll('#'+g+' .emoji-btn').forEach(b=>b.classList.remove('selected'));btn.classList.add('selected');vals[g]=parseInt(btn.dataset.val);}

function toggleTag(btn){btn.classList.toggle('selected');}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.querySelectorAll('.nav-item').forEach(b=>b.classList.remove('active'));
  const n=navMap[id];if(n)document.getElementById(n).classList.add('active');
  if(id==='screen-history')renderHistory();
  if(id==='screen-stats')renderStats();
  if(id==='screen-heute')renderHeute();
  if(id==='screen-uebungen')renderUebungen();
  window.scrollTo(0,0);
}

function showToast(msg,type='ok'){const t=document.getElementById('toast');t.textContent=msg;t.className='toast '+type+' show';setTimeout(()=>t.classList.remove('show'),2500);}

function getOffsetDate(offset){const d=new Date();d.setDate(d.getDate()+offset);return d;}
function formatDateStr(d){return d.toISOString().split('T')[0];}
function formatDateDisplay(d){
  const today=new Date();today.setHours(0,0,0,0);
  const target=new Date(d);target.setHours(0,0,0,0);
  const diff=(target-today)/86400000;
  if(diff===0)return'Heute';if(diff===1)return'Morgen';if(diff===-1)return'Gestern';
  return d.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
}

function filterUebungen(val){renderUebungen(val);}
function changeDay(dir){currentDayOffset+=dir;renderHeute();}

function calcStreak(){
  const entries=getEntries();if(!entries.length)return 0;
  const dates=[...new Set(entries.map(e=>e.date))].sort().reverse();
  let streak=0,current=new Date();current.setHours(0,0,0,0);
  for(let d of dates){const ed=new Date(d+'T12:00:00');ed.setHours(0,0,0,0);const diff=(current-ed)/86400000;if(diff<=1){streak++;current=ed;}else break;}
  return streak;
}

function updateStreak(){
  const s=calcStreak();const bar=document.getElementById('streak-bar');if(!bar)return;
  if(s===0){bar.innerHTML='<span style="font-size:13px;color:#cc9900;">Noch kein Streak — fang heute an! 🔥</span>';return;}
  const flames=s>=7?'🔥🔥🔥':s>=3?'🔥🔥':'🔥';
  bar.innerHTML=`<span class="streak-num">${s}</span><span class="streak-label">Tage am Stück ${flames}</span>`;
}

async function renderHeute(forceRefresh=false){
  const targetDate=getOffsetDate(currentDayOffset);
  const targetStr=formatDateStr(targetDate);
  const displayStr=formatDateDisplay(targetDate);
  document.getElementById('heute-title').textContent=displayStr;
  document.getElementById('heute-date').textContent=targetDate.toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'long'});
  document.getElementById('prev-day').disabled=currentDayOffset<=-6;
  document.getElementById('next-day').disabled=currentDayOffset>=6;
  if(currentDayOffset===0)updateStreak();
  const content=document.getElementById('heute-content');

  let plan=null;
  if(!forceRefresh){plan=getCachedPlan();}
  if(plan){renderFromPlan(plan,targetStr,content,targetDate);return;}

  content.innerHTML='<div style="text-align:center;padding:2rem;color:#555566;">⏳</div>';
  const wh=getWebhook();
  try{
    const resp=await fetch(wh+'?action=plan',{mode:'cors'});
    const data=await resp.json();
    if(data.status==='ok'&&data.plan&&data.plan.length){
      setCachedPlan(data.plan);
      renderFromPlan(data.plan,targetStr,content,targetDate);
    }else{showNoPlan(content,targetDate);}
  }catch(e){showNoPlan(content,targetDate);}
}

function renderFromPlan(plan,targetStr,content,targetDate){
  const dayPlan=plan.filter(p=>p.datum===targetStr);
  if(dayPlan.length){
    const echteUebungen=dayPlan.filter(p=>p.uebung&&String(p.uebung).trim()!=='');
    if(echteUebungen.length){
      renderDayPlan(dayPlan,content,targetStr);
    }else{
      const icon=dayPlan[0].icon||'📅';
      const einheit=dayPlan[0].einheit||'Heute';
      content.innerHTML=`<div class="no-plan-card">
        <div class="no-plan-icon">${icon}</div>
        <div class="no-plan-title">${einheit}</div>
      </div>`;
    }
  }else{showNoPlan(content,targetDate);}
  const btn=document.createElement('button');
  btn.style.cssText='display:block;width:calc(100% - 32px);margin:12px 16px 0;padding:10px;background:transparent;color:var(--text3);border:0.5px solid var(--border);border-radius:12px;font-size:13px;cursor:pointer;';
  btn.textContent='🔄 Plan aktualisieren';
  btn.onclick=()=>{clearPlanCache();showToast('Wird aktualisiert…');renderHeute(true);};
  content.appendChild(btn);
}

function showNoPlan(container,date){
  const dow=date.getDay();
  const info=TAGESTEXT[dow]||{icon:'💤',title:'Ruhetag',sub:'Erholung gehört dazu.'};
  container.innerHTML=`<div class="no-plan-card">
    <div class="no-plan-icon">${info.icon}</div>
    <div class="no-plan-title">${info.title}</div>
    <div class="no-plan-sub">${info.sub}</div>
  </div>`;
}

function renderDayPlan(plan,container,dateStr){
  const einheit=plan[0].einheit||'Athletiktraining';
  const isAthletik=einheit.toLowerCase().includes('athletik');
  const uebungen=plan.filter(u=>u.uebung&&String(u.uebung).trim()!=='');
  checkedUebungen={};

  if(!uebungen.length){
    // Kein Übungen — nur Info-Karte zeigen
    const icon=plan[0].icon||'📅';
    container.innerHTML=`<div class="no-plan-card">
      <div class="no-plan-icon">${icon}</div>
      <div class="no-plan-title">${einheit}</div>
    </div>`;
    return;
  }

  let html=`<div class="heute-hero"><div class="heute-badge">Heute</div><div class="heute-title">${einheit}</div><div class="heute-sub">${uebungen.length} Übungen</div></div>`;
  html+='<div class="card"><div class="card-title">Übungen</div>';
  uebungen.forEach((u,i)=>{
    const detail=[u.saetze?u.saetze+' Sätze':'',u.wdh||''].filter(Boolean).join(' · ');
    if(isAthletik){
      html+=`<div class="uebung-item" id="uebung-${i}" onclick="toggleUebung(${i})">
        <div class="uebung-check" id="check-${i}"></div>
        <div class="uebung-info">
          <div class="uebung-name">${u.uebung}</div>
          ${detail?`<div class="uebung-detail">${detail}</div>`:''}
          ${u.hinweis?`<div class="uebung-hinweis">💡 ${u.hinweis}</div>`:''}
        </div>
      </div>`;
    } else {
      html+=`<div class="uebung-item" style="cursor:default;">
        <div class="uebung-info">
          <div class="uebung-name">${u.uebung}</div>
          ${detail?`<div class="uebung-detail">${detail}</div>`:''}
          ${u.hinweis?`<div class="uebung-hinweis">💡 ${u.hinweis}</div>`:''}
        </div>
      </div>`;
    }
  });
  html+='</div>';
  if(isAthletik&&currentDayOffset===0)html+=`<button class="abschluss-btn" onclick="einheitAbschliessen()">Einheit abgeschlossen 💪</button>`;
  container.innerHTML=html;
  window._todayPlanCount=isAthletik?uebungen.length:0;
}

function toggleUebung(i){
  checkedUebungen[i]=!checkedUebungen[i];
  const item=document.getElementById('uebung-'+i);
  const check=document.getElementById('check-'+i);
  if(checkedUebungen[i]){item.classList.add('done');check.classList.add('done');}
  else{item.classList.remove('done');check.classList.remove('done');}
  const total=window._todayPlanCount||0;
  const done=Object.values(checkedUebungen).filter(Boolean).length;
  if(done===total&&total>0)showToast('Alle Übungen geschafft! 🔥');
}

function einheitAbschliessen(){
  showScreen('screen-log');
  document.getElementById('entry-date').value=formatDateStr(new Date());
  const dow=new Date().getDay();
  const tag=dow===2?'Athletik Di':dow===4?'Athletik Do':'';
  if(tag)document.querySelectorAll('#aktivitaet .tag').forEach(t=>{if(t.textContent.trim()===tag)t.classList.add('selected');});
  showToast('Jetzt Befinden eintragen!');
}

async function saveEntry(){
  const dateVal=document.getElementById('entry-date').value;
  const tags=Array.from(document.querySelectorAll('#aktivitaet .tag.selected')).map(t=>t.textContent.trim());
  const entry={date:dateVal,beine:vals.beine,energie:vals.energie,schlaf:vals.schlaf,stimmung:vals.stimmung,intensity:intensityVal,tags,notiz:document.getElementById('notiz').value.trim(),ts:Date.now()};
  const entries=getEntries();
  const filtered=entries.filter(e=>e.date!==dateVal);
  filtered.unshift(entry);filtered.sort((a,b)=>b.date.localeCompare(a.date));
  saveEntries(filtered);showToast('Gespeichert ✓');resetForm();updateStreak();
  const wh=getWebhook();
  if(wh){try{await fetch(wh,{method:'POST',body:JSON.stringify(entry),headers:{'Content-Type':'application/json'},mode:'no-cors'});}catch(e){}}
}

function resetForm(){
  document.querySelectorAll('.emoji-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('.int-btn').forEach(b=>b.classList.remove('selected'));
  document.querySelectorAll('#aktivitaet .tag').forEach(t=>t.classList.remove('selected'));
  document.getElementById('notiz').value='';
  document.getElementById('entry-date').value=formatDateStr(new Date());
  vals.beine=0;vals.energie=0;vals.schlaf=0;vals.stimmung=0;intensityVal='';
}

function askDelete(date){
  deleteTarget=date;
  document.getElementById('confirm-text').textContent='Eintrag vom '+new Date(date+'T12:00:00').toLocaleDateString('de-DE',{weekday:'long',day:'2-digit',month:'2-digit'})+' wird gelöscht.';
  document.getElementById('confirm-overlay').style.display='flex';
}
function closeConfirm(){document.getElementById('confirm-overlay').style.display='none';deleteTarget=null;}
async function confirmDelete(){
  if(!deleteTarget)return;
  saveEntries(getEntries().filter(e=>e.date!==deleteTarget));
  closeConfirm();renderHistory();showToast('Eintrag gelöscht');
  const wh=getWebhook();
  if(wh){try{await fetch(wh,{method:'POST',body:JSON.stringify({action:'deleteEntry',date:deleteTarget}),headers:{'Content-Type':'application/json'},mode:'no-cors'});}catch(e){}}
  deleteTarget=null;
}

        <div class="uebung-lib-cue">💡 ${u.cue}</div>
        ${u.vid?`
        <div id="vid-container-${i}" style="margin-top:12px;">
          <button onclick="loadVid(${i},'${u.vid}')" style="width:100%;padding:10px;background:#ff0000;color:#fff;border:none;border-radius:10px;font-size:14px;font-weight:600;cursor:pointer;">▶ Video ansehen</button>
        </div>`:''}
      </div>
    </div>`).join('');
}
function toggleLib(i){document.getElementById('lib-'+i).classList.toggle('open');}
function loadVid(i,vid){
  const c=document.getElementById('vid-container-'+i);
  c.innerHTML=`<div style="position:relative;padding-bottom:56.25%;height:0;overflow:hidden;border-radius:10px;margin-top:4px;">
    <iframe src="https://www.youtube.com/embed/${vid}?autoplay=1" 
      style="position:absolute;top:0;left:0;width:100%;height:100%;border:none;border-radius:10px;" 
      allow="autoplay;encrypted-media" allowfullscreen
      onerror="this.parentElement.parentElement.innerHTML='<a href=\\'https://www.youtube.com/watch?v=${vid}\\' target=\\'_blank\\' style=\\'display:block;width:100%;padding:10px;background:#ff0000;color:#fff;border-radius:10px;font-size:14px;font-weight:600;text-align:center;text-decoration:none;\\'>▶ Auf YouTube öffnen</a>'">
    </iframe>
  </div>
  <div style="text-align:center;margin-top:6px;">
    <a href="https://www.youtube.com/watch?v=${vid}" target="_blank" style="font-size:12px;color:var(--text3);">↗ In YouTube öffnen</a>
  </div>`;
}

function avg(arr){const v=arr.filter(x=>x>0);return v.length?v.reduce((a,b)=>a+b,0)/v.length:null;}

function renderStats(){
  const entries=getEntries();
  const days=['Mo','Di','Mi','Do','Fr','Sa','So'];
  const today=new Date();today.setHours(0,0,0,0);
  const dow=today.getDay();const mondayOffset=dow===0?6:dow-1;
  const weekDays=[];
  for(let i=0;i<7;i++){const d=new Date(today);d.setDate(today.getDate()-mondayOffset+i);weekDays.push(d.toISOString().split('T')[0]);}
  document.getElementById('week-grid').innerHTML=weekDays.map((d,i)=>{
    const e=entries.find(en=>en.date===d);
    return`<div class="week-day ${e?'has-entry':''}"><div class="week-day-name">${days[i]}</div><div class="week-day-emoji">${e?(e.beine?emojiMap[e.beine]:'✓'):'·'}</div></div>`;
  }).join('');
  const cutoff=new Date();cutoff.setDate(cutoff.getDate()-28);
  const recent=entries.filter(e=>new Date(e.date)>=cutoff);
  const aB=avg(recent.map(e=>e.beine)),aE=avg(recent.map(e=>e.energie)),aS=avg(recent.map(e=>e.schlaf));
  document.getElementById('stats-grid').innerHTML=[
    {num:calcStreak()+'🔥',lbl:'Streak'},
    {num:recent.length,lbl:'Einträge'},
    {num:aB?aB.toFixed(1)+' / 5':'—',lbl:'Beine Ø'},
    {num:aE?aE.toFixed(1)+' / 5':'—',lbl:'Energie Ø'},
    {num:aS?aS.toFixed(1)+' / 5':'—',lbl:'Schlaf Ø'},
  ].map(s=>`<div class="stat-card"><div class="stat-num">${s.num}</div><div class="stat-lbl">${s.lbl}</div></div>`).join('');
  const low=recent.filter(e=>(e.beine>0&&e.beine<=2)||(e.energie>0&&e.energie<=2));
  document.getElementById('trend-list').innerHTML=low.length
    ?low.slice(0,6).map(e=>`<div style="font-size:13px;padding:6px 0;border-bottom:0.5px solid #2a2a38;color:#888899;">${new Date(e.date+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit'})} — Beine ${e.beine?emojiMap[e.beine]:'—'} Energie ${e.energie?emojiMap[e.energie]:'—'}</div>`).join('')
    :'<div style="font-size:14px;color:#00e5a0;padding:4px 0;">Keine kritischen Einträge ✓</div>';
}

// Setup im Stats-Screen versteckt — URL bleibt gespeichert
const savedUrl=localStorage.getItem(WEBHOOK_KEY);
if(!savedUrl)localStorage.setItem(WEBHOOK_KEY,WEBHOOK_URL);

document.getElementById('entry-date').value=formatDateStr(new Date());
renderHeute();
</script>
